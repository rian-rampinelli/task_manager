spring:
  application:
    name: task-manager
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/task_manager
    username: postgres
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

jwt:
  expiration: ${JWT_EXPIRATION:900000}
  key: ${JWT_KEY}
